name: Post Motivation to Facebook
on:
  schedule:
    - cron: '30 1 * * *'   # 7:00 AM IST
    - cron: '30 3 * * *'   # 9:00 AM IST
    - cron: '30 5 * * *'   # 11:00 AM IST
    - cron: '30 7 * * *'   # 1:00 PM IST
    - cron: '30 9 * * *'   # 3:00 PM IST
    - cron: '30 11 * * *'  # 5:00 PM IST
    - cron: '30 13 * * *'  # 7:00 PM IST
    - cron: '30 16 * * *'  # 10:00 PM IST
  workflow_dispatch:
jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pillow requests
      - name: Install fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-dejavu wget
          mkdir -p /tmp/fonts
          wget -q "https://github.com/google/fonts/raw/main/ofl/lora/Lora%5Bwght%5D.ttf" -O /tmp/fonts/Lora.ttf || true
          wget -q "https://github.com/google/fonts/raw/main/ofl/playfairdisplay/PlayfairDisplay%5Bwght%5D.ttf" -O /tmp/fonts/PlayfairDisplay.ttf || true
          wget -q "https://github.com/google/fonts/raw/main/ofl/josefinsans/JosefinSans%5Bwght%5D.ttf" -O /tmp/fonts/JosefinSans.ttf || true
      - name: Generate and post
        env:
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: python post_motivation.py
      - name: Save progress
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config --global user.email "bot@motivation.auto"
          git config --global user.name "Motivation Bot"
          git add used_quotes.json style_counter.json || true
          git diff --staged --quiet || git commit -m "Track progress [skip ci]"
          git push https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git HEAD:main || true
